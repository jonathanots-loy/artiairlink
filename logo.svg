<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 110" width="440" height="110">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2e7a36"/>
      <stop offset="100%" stop-color="#1a3d20"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="100%" x2="60%" y2="0%">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#88c98a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a3d20" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- === BADGE CIRCULAIRE === -->
  <circle cx="55" cy="55" r="51" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- ── DRONE VUE DE FACE ── -->

  <!-- Rotor gauche (cercle = vue de face) -->
  <circle cx="21" cy="30" r="11" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
  <!-- Pales rotor gauche -->
  <line x1="14" y1="30" x2="28" y2="30" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <line x1="21" y1="23" x2="21" y2="37" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <!-- Moyeu gauche -->
  <circle cx="21" cy="30" r="3" fill="white"/>

  <!-- Rotor droit (cercle = vue de face) -->
  <circle cx="89" cy="30" r="11" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
  <!-- Pales rotor droit -->
  <line x1="82" y1="30" x2="96" y2="30" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <line x1="89" y1="23" x2="89" y2="37" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <!-- Moyeu droit -->
  <circle cx="89" cy="30" r="3" fill="white"/>

  <!-- Bras gauche (rotor → corps) -->
  <line x1="31" y1="32" x2="46" y2="41" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Bras droit (rotor → corps) -->
  <line x1="79" y1="32" x2="64" y2="41" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Corps central -->
  <rect x="46" y="38" width="18" height="11" rx="3" fill="white"/>

  <!-- Carénage caméra (suspendu sous le corps) -->
  <line x1="55" y1="49" x2="55" y2="55" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="55" cy="61" r="7" fill="white" opacity="0.95"/>
  <!-- Objectif -->
  <circle cx="55" cy="61" r="3.5" fill="#2e7a36"/>
  <circle cx="55" cy="61" r="1.5" fill="#88c98a"/>

  <!-- Faisceau d'analyse (caméra → plante) -->
  <line x1="55" y1="68" x2="55" y2="74" stroke="white" stroke-width="1.5" stroke-dasharray="2,3" opacity="0.4"/>

  <!-- ── PLANTE ── -->
  <line x1="55" y1="93" x2="55" y2="76" stroke="url(#leaf)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Feuille gauche -->
  <path d="M55 85 Q42 77 40 67 Q51 75 55 85Z" fill="url(#leaf)"/>
  <!-- Feuille droite -->
  <path d="M55 85 Q68 77 70 67 Q59 75 55 85Z" fill="#5cb85c" opacity="0.85"/>
  <!-- Bourgeon -->
  <path d="M55 76 Q52 69 55 63 Q58 69 55 76Z" fill="#b2dfb4"/>

  <!-- === TEXTE === -->
  <text x="124" y="63"
        font-family="'Segoe UI Black', 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="46" font-weight="900" letter-spacing="-1">
    <tspan fill="#1a3d20">Agro</tspan><tspan fill="#2e7a36">Vision</tspan>
  </text>

  <text x="125" y="81"
        font-family="'Segoe UI', 'Segoe UI Semibold', Arial, sans-serif"
        font-size="11.5" fill="#3a7a40" letter-spacing="2.6">INTELLIGENCE AGRICOLE · PAR DRONE</text>

  <line x1="125" y1="89" x2="432" y2="89" stroke="#1a3d20" stroke-width="0.8" opacity="0.2"/>

  <text x="125" y="103"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#1a3d20" opacity="0.55" letter-spacing="2.5">by ArtiAirLink</text>
</svg>
