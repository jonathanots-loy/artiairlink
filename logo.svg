<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 110" width="440" height="110">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2e7a36"/>
      <stop offset="100%" stop-color="#1a3d20"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="100%" x2="60%" y2="0%">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#88c98a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a3d20" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- === BADGE CIRCULAIRE === -->
  <circle cx="55" cy="55" r="51" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Drone — corps -->
  <rect x="46" y="36" width="18" height="12" rx="3" fill="white"/>
  <!-- Camera lens -->
  <circle cx="55" cy="42" r="3.5" fill="#2e7a36"/>
  <circle cx="55" cy="42" r="1.5" fill="#88c98a"/>

  <!-- Bras drone (4 diagonales) -->
  <line x1="47" y1="37" x2="34" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="63" y1="37" x2="76" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="47" y1="47" x2="34" y2="60" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="63" y1="47" x2="76" y2="60" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Rotors -->
  <ellipse cx="34" cy="23" rx="10" ry="3.2" fill="white" opacity="0.88"/>
  <ellipse cx="76" cy="23" rx="10" ry="3.2" fill="white" opacity="0.88"/>
  <ellipse cx="34" cy="60" rx="10" ry="3.2" fill="white" opacity="0.88"/>
  <ellipse cx="76" cy="60" rx="10" ry="3.2" fill="white" opacity="0.88"/>

  <!-- Faisceau d'analyse (pointillés de la caméra vers la plante) -->
  <line x1="55" y1="49" x2="55" y2="68" stroke="white" stroke-width="1.5" stroke-dasharray="2.5,3" opacity="0.4"/>

  <!-- Plante / Végétation -->
  <line x1="55" y1="93" x2="55" y2="70" stroke="url(#leaf)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Feuille gauche -->
  <path d="M55 82 Q42 73 40 63 Q50 71 55 82Z" fill="url(#leaf)"/>
  <!-- Feuille droite -->
  <path d="M55 82 Q68 73 70 63 Q60 71 55 82Z" fill="#5cb85c" opacity="0.85"/>
  <!-- Bourgeon supérieur -->
  <path d="M55 70 Q52 62 55 55 Q58 62 55 70Z" fill="#b2dfb4"/>

  <!-- === TEXTE === -->
  <!-- Nom du produit -->
  <text x="124" y="63"
        font-family="'Segoe UI Black', 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="46" font-weight="900" letter-spacing="-1">
    <tspan fill="#1a3d20">Agro</tspan><tspan fill="#2e7a36">Vision</tspan>
  </text>

  <!-- Tagline -->
  <text x="125" y="81"
        font-family="'Segoe UI', 'Segoe UI Semibold', Arial, sans-serif"
        font-size="11.5" fill="#3a7a40" letter-spacing="2.6">INTELLIGENCE AGRICOLE · PAR DRONE</text>

  <!-- Séparateur -->
  <line x1="125" y1="89" x2="432" y2="89" stroke="#1a3d20" stroke-width="0.8" opacity="0.2"/>

  <!-- Entreprise -->
  <text x="125" y="103"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#1a3d20" opacity="0.55" letter-spacing="2.5">by ArtiAirLink</text>
</svg>
